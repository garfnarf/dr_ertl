# Decap CMS Konfiguration
#
# WICHTIG – vor dem ersten Login einmalig einrichten:
# 1. Repo auf GitLab anlegen und `repo:` unten anpassen (z.B. "meingruppe/praxis-dr-ertl").
# 2. Auf GitLab eine Application anlegen (User Settings → Applications):
#    - Name: Praxis CMS
#    - Redirect URI: https://<deine-domain>/admin/
#    - Scopes: api
#    - "Confidential" NICHT ankreuzen (PKCE = public client)
# 3. Die Application ID unten bei `app_id:` eintragen.
# Redakteure melden sich dann mit ihrem GitLab-Konto an; Schreibrechte auf das
# Repo (Rolle "Developer" oder höher) genügen.

backend:
  name: gitlab
  repo: REPLACE_ME/praxis-dr-ertl
  branch: main
  auth_type: pkce
  app_id: REPLACE_ME_GITLAB_APPLICATION_ID

# Für lokales Arbeiten: `npx decap-server` starten und Zeile aktivieren
local_backend: true

locale: de
site_url: https://praxis-dr-ertl.de
display_url: https://praxis-dr-ertl.de
media_folder: public/uploads
public_folder: /uploads

collections:
  - name: aktuelles
    label: Aktuelles (Startseite)
    label_singular: Eintrag
    folder: src/content/aktuelles
    create: true
    slug: '{{slug}}'
    sortable_fields: [reihenfolge, titel]
    summary: '{{titel}} (Reihenfolge: {{reihenfolge}}, sichtbar: {{sichtbar}})'
    fields:
      - { name: titel, label: Überschrift, widget: string }
      - { name: kicker, label: 'Kleine Zeile über der Überschrift', widget: string }
      - { name: reihenfolge, label: Reihenfolge, widget: number, hint: 'Kleinere Zahl = weiter oben' }
      - { name: sichtbar, label: Sichtbar, widget: boolean, default: true, hint: 'Aus = Eintrag wird nicht angezeigt (praktisch für Urlaubs-Hinweise)' }
      - name: listenIcon
        label: Symbol für Aufzählungen
        widget: select
        options:
          - { label: 'Pfeil (›)', value: chevron }
          - { label: 'Warndreieck (⚠)', value: warnung }
        default: chevron
        required: false
      - { name: rezeptformular, label: Rezeptformular anzeigen, widget: boolean, default: false, required: false }
      - name: button
        label: Button (optional)
        widget: object
        required: false
        fields:
          - { name: text, label: Beschriftung, widget: string, required: false }
          - { name: url, label: Link, widget: string, required: false }
      - { name: body, label: Text, widget: markdown }

  - name: leistungen
    label: Leistungen
    label_singular: Leistung
    folder: src/content/leistungen
    create: true
    slug: '{{slug}}'
    sortable_fields: [reihenfolge, titel]
    summary: '{{titel}} (Reihenfolge: {{reihenfolge}})'
    fields:
      - { name: titel, label: Titel, widget: string }
      - { name: untertitel, label: Untertitel, widget: string, required: false, default: '' }
      - name: icon
        label: Symbol
        widget: select
        options:
          - { label: Arzt, value: fas fa-user-md }
          - { label: Herz (Puls), value: fas fa-heartbeat }
          - { label: Würfel, value: fas fa-dice-d20 }
          - { label: Tabletten, value: fas fa-pills }
          - { label: Waage, value: fas fa-balance-scale }
          - { label: 'Hand mit Herz', value: fas fa-hand-holding-heart }
          - { label: Baum, value: fas fa-tree }
          - { label: Flugzeug, value: fas fa-plane-departure }
          - { label: Blüte, value: fas fa-spa }
          - { label: Pizza, value: fas fa-pizza-slice }
          - { label: Mikroskop, value: fas fa-microscope }
          - { label: Stethoskop, value: fas fa-stethoscope }
          - { label: Spritze, value: fas fa-syringe }
      - { name: bild, label: Bild, widget: image }
      - { name: reihenfolge, label: Reihenfolge, widget: number }
      - { name: body, label: 'Inhalt (Aufzählung)', widget: markdown, hint: 'Aufzählungspunkte werden automatisch mit grünen Häkchen dargestellt' }

  - name: aerzte
    label: Ärzteteam
    label_singular: Ärztin/Arzt
    folder: src/content/aerzte
    create: true
    slug: '{{slug}}'
    sortable_fields: [reihenfolge, name]
    summary: '{{name}} (Reihenfolge: {{reihenfolge}})'
    fields:
      - { name: name, label: Name, widget: string }
      - { name: beschreibung, label: 'Beschreibung (auf Team-Seite)', widget: text, required: false }
      - { name: untertitel, label: 'Berufsbezeichnung (auf Lebenslauf-Seite)', widget: string }
      - { name: foto, label: 'Foto (Hochformat)', widget: image }
      - { name: fotoQuadrat, label: 'Foto (quadratisch, für Lebenslauf)', widget: image }
      - { name: reihenfolge, label: Reihenfolge, widget: number }
      - { name: zitat, label: 'Persönlicher Text (Zitat)', widget: text }
      - name: stationen
        label: Lebenslauf-Stationen
        widget: list
        fields:
          - { name: zeitraum, label: Zeitraum, widget: string }
          - { name: text, label: Beschreibung, widget: text }
      - { name: body, label: ' ', widget: hidden, default: '' }

  - name: team
    label: Praxisteam
    label_singular: Teammitglied
    folder: src/content/team
    create: true
    slug: '{{slug}}'
    sortable_fields: [reihenfolge, name]
    summary: '{{name}} – {{rolle}}'
    fields:
      - { name: name, label: Name, widget: string }
      - { name: rolle, label: Berufsbezeichnung, widget: string }
      - { name: foto, label: Foto, widget: image }
      - { name: reihenfolge, label: Reihenfolge, widget: number }
      - { name: body, label: ' ', widget: hidden, default: '' }

  - name: einstellungen
    label: Einstellungen
    files:
      - name: praxis
        label: 'Praxis (Kontakt, Sprechzeiten, Terminbuchung)'
        file: src/data/praxis.yaml
        fields:
          - { name: name, label: Praxisname, widget: string }
          - name: adresse
            label: Adresse
            widget: object
            fields:
              - { name: strasse, label: 'Straße und Hausnummer', widget: string }
              - { name: ort, label: 'PLZ und Ort', widget: string }
          - { name: telefon, label: Telefon, widget: string }
          - { name: rezepthotline, label: Rezepthotline, widget: string }
          - { name: fax, label: Fax, widget: string }
          - { name: email, label: 'E-Mail', widget: string }
          - { name: terminland, label: 'Link zur Online-Terminbuchung', widget: string }
          - name: announcement
            label: 'Oranger Balken oben (Termin-Onlinebuchung)'
            widget: object
            fields:
              - { name: sichtbar, label: Sichtbar, widget: boolean }
              - { name: text, label: Text, widget: string }
              - { name: url, label: Link, widget: string }
          - name: sprechzeiten
            label: Sprechzeiten
            widget: list
            fields:
              - { name: tag, label: Tag, widget: string }
              - { name: zeiten, label: Zeiten, widget: string }
          - { name: sprechstundeKurz, label: 'Sprechstunde (Kurzform im Fußbereich)', widget: string }
          - { name: emailHinweis, label: 'E-Mail-Hinweis (Fußbereich)', widget: text }
          - { name: kontaktHinweis, label: 'E-Mail-Hinweis (Kontaktseite)', widget: text }
          - { name: notdienst, label: Notdienst-Hinweis, widget: text }
      - name: ueberuns
        label: 'Seite „Über Uns"'
        file: src/data/ueber-uns.yaml
        fields:
          - name: galerie
            label: Bildergalerie
            widget: list
            field: { name: bild, label: Bild, widget: image }
          - name: zahlen
            label: 'Zahlen (Zähler)'
            widget: list
            fields:
              - { name: wert, label: Zahl, widget: number }
              - { name: text, label: Beschriftung, widget: string }
          - name: willkommen
            label: Willkommens-Text
            widget: object
            fields:
              - { name: titel, label: Titel, widget: string }
              - { name: untertitel, label: Untertitel, widget: string }
              - { name: text, label: Text, widget: text }
          - name: weitereInfos
            label: Weitere Informationen
            widget: object
            fields:
              - { name: text, label: Einleitung, widget: string }
              - name: boxen
                label: Info-Boxen
                widget: list
                fields:
                  - { name: icon, label: 'Symbol (Font-Awesome-Klasse)', widget: string }
                  - { name: titel, label: Titel, widget: string }
                  - { name: text, label: Text, widget: text }

  - name: seiten
    label: Rechtliches
    files:
      - name: impressum
        label: Impressum
        file: src/content/seiten/impressum.md
        fields:
          - { name: titel, label: Titel, widget: string }
          - { name: body, label: Inhalt, widget: markdown }
      - name: datenschutz
        label: Datenschutzerklärung
        file: src/content/seiten/datenschutz.md
        fields:
          - { name: titel, label: Titel, widget: string }
          - { name: body, label: Inhalt, widget: markdown }
