reihenfolge: 30
zitat: Seit 1997 bin ich als fachärztlicher Internist in Oberhaching niedergelassen.
  Meine Leistungsschwerpunkte liegen in der Diagnostik und Therapie von Herz- und
  Gefäßerkrankungen. Nach Abschluss des Studiums 1983 an der LMU München verbrachte
  ich über zwei Jahre in der Gefäßmedizin am Klinikum Neuperlach. Anschließend wechselte
  ich in die Innere Medizin. Hier war ich über sieben Jahre ärztlicher Leiter der
  internistischen Intensivstation, wodurch ich eine umfassende Ausbildung in der Notfallmedizin
  erhielt. Seitdem hat sich ein großes Netzwerk medizinischer Kontakte gebildet.
