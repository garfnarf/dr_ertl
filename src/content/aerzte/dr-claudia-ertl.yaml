name: Dr. med. Claudia Ertl
beschreibung: Praktische Ärztin, Ernährungsmedizin, Homöopathie, psychosomatische
  und geriatrische Grundversorgung
untertitel: Praktische Ärztin, Ernährungsmedizin, Homöopathie, psychosomatische und
  geriatrische Grundversorgung
foto: /uploads/claudia-ertl.jpg
fotoQuadrat: /uploads/claudia-ertl-quadrat.jpg
foto_alt: Porträt von Dr. med. Claudia Ertl, lächelnd in einem rosa gestreiften Hemd
reihenfolge: 20
zitat: Nach Abschluss meines Studiums an der LMU München 1985 erhielt ich meine internistische
  Ausbildung im Kreiskrankenhaus Bad Aibling. Seit 1995 bin ich in Oberhaching als
  Praktische Ärztin niedergelassen. Besondere Freude machen mir hierbei die Kinder-
  und Jugendmedizin und die Dermatologie. Daneben erlangte ich die Zusatzbezeichnungen
  für Homöopathie, Ernährungsmedizin, psychosomatische Medizin und geriatrische Grundversorgung.
  Aktuell absolviere ich die Weiterbildung für die Zusatzbezeichnung Palliativmedizin.
stationen:
- zeitraum: '1997'
  text: Gründung der gemeinsamen Praxis mit Dr. med. Ludwig Ertl
- zeitraum: seit 1994
  text: 'Zusatzbezeichnungen: Homöopathie, psychosomatische Grundversorgung, Ernährungsmedizin,
    geriatrische Grundversorgung. Weiterbildungen: sonographische Untersuchungen der
    Schilddrüse und des Abdomens und Retroperitoneums, allergologische Leistungen,
    übende Verfahren (PMR nach Jakobson), Belehrungen zum Infektionsschutzgesetz,
    Hautkrebsscreening, Leistungen zur med. Reha, Schulung von Patienten mit Diabetes
    mellitus Typ 2'
- zeitraum: 1993-1997
  text: Niederlassung in Gemeinschaftspraxis mit Allgemeinarzt Dr. med. P. Schlosser
    in Unterhaching (ab 1995 in Oberhaching)
- zeitraum: '1993'
  text: Berechtigung zur Bezeichnung als „Praktische Ärztin“
- zeitraum: 1988-1993
  text: Weiterbildungszeit in Dermatologie, Allgemeinmedizin, Gastroenterologie, Notfallmedizin
    und Sonographie-Abt. Krankenhaus Neuperlach
- zeitraum: '1986'
  text: Promotion
- zeitraum: 1985-1987
  text: Anstellung als Assistenzärztin für Innere Medizin am Kreiskrankenhaus Bad
    Aibling, dort Sonographie, LZ-EKG, LZ-RR, Dopplersonographie, Wachstation
- zeitraum: 1979-1985
  text: Beginn des Medizinstudiums an der LMU (Schwerpunke Pädiatrie, Dermatologie
    und Innere Medizin)
