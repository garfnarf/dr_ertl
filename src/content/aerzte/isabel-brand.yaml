zitat: Schon seit jungen Jahren begeistere ich mich für die Allgemeinmedizin. Im Rahmen
  meines Studiums an der LMU München und im Praktischen Jahr habe ich vor allem Erfahrungen
  in der Chirurgie, Inneren Medizin und Anästhesie sammeln dürfen. Zudem habe ich
  fünf Jahre lang ehrenamtlich mehrmals monatlich in einer Praxis für Menschen ohne
  Krankenversicherung gearbeitet und dadurch einen großen Einblick in die Allgemeinmedizin
  gewonnen. Seit Oktober 2025 bin ich in der Praxis Dr. Ertl als Weiterbildungsassistentin
  für Allgemeinmedizin angestellt. Ich freue mich schon darauf, Sie kennenzulernen.
