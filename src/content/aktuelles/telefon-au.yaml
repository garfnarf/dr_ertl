titel: Telefon-AU (Elektronische Arbeitsunfähigkeitsbescheinigung)
kicker: Aktuelle Informationen
reihenfolge: 50
sichtbar: true
listenIcon: chevron
text: '- Versicherungskarte für aktuelles Quartal bereits eingelesen

  - Patient ist der Praxis bekannt

  - Max. 5 Tage möglich

  - Arzt-Patienten-Kontakt zumindest telefonisch nötig (Telefonsprechstunde Montag,
  Dienstag, Donnerstag 13.00-13.30h)

  - Bescheinigung für den Bezug von Krankengeld bei Erkrankung eines Kindes telefonisch
  möglich nach Ermessen des Arztes und sofern die Familie bekannt ist

  - Kein gesetzlicher Anspruch auf Telefon-AU'
