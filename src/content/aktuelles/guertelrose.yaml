titel: Gürtelrose
kicker: Ein schlummerndes Risiko
reihenfolge: 70
sichtbar: true
button:
  text: Mehr erfahren
  url: https://www.impfen.de/impfungen/guertelrose-herpes-zoster/
text: 'Liebe Patienten,


  seit 2018 steht mit „Shingrix“ ein sehr guter Impfstoff zum Schutz vor Gürtelrose
  zur Verfügung. Bei der Erkrankung kommt es zur Reaktivierung der in der Kindheit
  stattgehabten Windpockeninfektion. Deren Erreger verharren ein Leben lang im Körper
  und können bei vorübergehender Immunschwäche (Stress, Tumorerkrankung etc) erneut
  ausbrechen. Bezeichnend sind die im Verlauf eines Hautnervens aufschießenden, schmerzhaften,
  teils juckenden Bläschen. Eine gefürchtete und mit geschätzt 10% häufige Komplikation
  ist die Post-Zoster-Neuralgie: Nervenschmerzen, die zeitlich weit über die Hautveränderungen
  bestehen, hartnäckig und schwierig zu behandeln sind. Daneben kann es bei Auftreten
  im Gesicht auch zu (vorübergehenden) Gesichtslähmungen (sog. Fazialisparesen) kommen.


  **Wer:** Empfohlen für alle ab dem 60. Lebensjahr bzw ab dem 50. Mit bestimmten
  Vorerkrankungen.


  **Wie:** zweimal im Abstand von zwei Monaten, keine Auffrischung nötig


  **Impfreaktionen:** Abgeschlagenheit, Fieber und Gliederschmerzen treten bei immerhin
  10% der Geimpften auf, verschwinden aber innerhalb von zwei Tagen von selbst.


  Gürtelrose ist nicht selten: 400.000 Deutsche erkranken jährlich daran. Wir beraten
  Sie gerne zur Impfung.'
