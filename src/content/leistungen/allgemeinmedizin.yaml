text: '- Kinder- und Jugendmedizin, Vorsorgeuntersuchungen für Kinder und Jugendliche
  (U2-U11, J1 + 2)

  - Gesundheitsuntersuchung (Check-up)

  - Impfberatung und Impfungen

  - Erstdiagnostik und Behandlung akuter Beschwerden und Erkrankungen

  - Allergologie: Diagnostik, Therapie und Beratung bei allergischen Erkrankungen
  durch Hautpricktestungen, spezifische Immuntherapie (SIT, auch Hyposensibilisierung)

  - Hautkrebsscreening

  - Operationsvorbereitungen

  - Primäre Wundversorgung

  - Lebensmittelbelehrung, Infektionsschutzgesetz-Belehrung

  - Tauchsportuntersuchung, Sporttauglichkeitsuntersuchung

  - Gutachten/ Versicherungsuntersuchungen'
